name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push: { branches: [ "main" ] }
  pull_request: { branches: [ "main" ] }

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pre-commit/action@v3.0.1

  test-matrix:
    name: Test (${{ matrix.os }}, ${{ matrix.base }}-py${{ matrix.python-version }})
    needs: pre-commit
    runs-on: ${{ matrix.os }}

    env:
      OE_LICENSE: ${{ github.workspace }}/oe_license.txt
      PIXI_ENV: ${{ matrix.base }}-py${{ matrix.python-version }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["311", "312"]
        extras: [fe-examples-cpu, fe-examples-cu12, cpu, examples-pydantic-1-cpu, examples-pydantic-1-cu12]
        base:
          - openeye-fe-examples-cpu
          - ambertools-fe-examples-cpu
          - openeye-cpu
          - ambertools-fe-examples-cu12
          - ambertools-examples-pydantic-1-cpu
          - ambertools-examples-pydantic-1-cu12

        exclude:
          # CUDA envs don't run on macOS
          - os: macos-latest
            extras: fe-examples-cu12
          - os: macos-latest
            extras: examples-pydantic-1-cu12

    steps:
      - uses: actions/checkout@v4

      - name: Write OE license file
        env:
          OE_LICENSE_TEXT: ${{ secrets.OE_LICENSE }}
        run: echo "${OE_LICENSE_TEXT}" > "${OE_LICENSE}"

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: v0.63.2
          cache: true
          environments: ${{ env.PIXI_ENV }}

      - name: Run tests
        run: pixi run -e "${{ env.PIXI_ENV }}" test

      - name: Test examples
        if: contains(env.PIXI_ENV, 'examples')
        run: pixi run -e "${{ env.PIXI_ENV }}" test-examples

      - name: CodeCov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}

  test:
    needs: test-matrix
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test matrix result
        run: |
          if [[ "${{ needs.test-matrix.result }}" != "success" ]]; then
            echo "One or more test matrix jobs failed or were cancelled."
            exit 1
          fi
